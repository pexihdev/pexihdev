<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pexih Digital Clock - World Time Zone</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">⏰</div>
                <div class="logo-text">
                    <h1>Pexih Clock</h1>
                    <p>Share Time, Explore Zones</p>
                </div>
            </div>
            <div class="header-controls">
                <button id="themeBtn" class="theme-btn" title="Toggle Theme">
                    <span class="sun-icon">☀️</span>
                    <span class="moon-icon">🌙</span>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Add Time Zone Section -->
            <section class="add-timezone">
                <h2>Add Time Zone</h2>
                <div class="add-timezone-form">
                    <select id="timezoneSelect" class="timezone-select">
                        <option value="">Select a timezone...</option>
                        <optgroup label="UTC">
                            <option value="UTC">UTC (Coordinated Universal Time)</option>
                        </optgroup>
                        <optgroup label="Americas">
                            <option value="America/New_York">Eastern (EST/EDT)</option>
                            <option value="America/Chicago">Central (CST/CDT)</option>
                            <option value="America/Denver">Mountain (MST/MDT)</option>
                            <option value="America/Los_Angeles">Pacific (PST/PDT)</option>
                            <option value="America/Anchorage">Alaska (AKST/AKDT)</option>
                            <option value="Pacific/Honolulu">Hawaii (HST)</option>
                            <option value="America/Toronto">Toronto (EST/EDT)</option>
                            <option value="America/Mexico_City">Mexico City (CST/CDT)</option>
                            <option value="America/Sao_Paulo">São Paulo (BRT)</option>
                            <option value="America/Buenos_Aires">Buenos Aires (ART)</option>
                        </optgroup>
                        <optgroup label="Europe">
                            <option value="Europe/London">London (GMT/BST)</option>
                            <option value="Europe/Paris">Paris (CET/CEST)</option>
                            <option value="Europe/Berlin">Berlin (CET/CEST)</option>
                            <option value="Europe/Madrid">Madrid (CET/CEST)</option>
                            <option value="Europe/Rome">Rome (CET/CEST)</option>
                            <option value="Europe/Amsterdam">Amsterdam (CET/CEST)</option>
                            <option value="Europe/Moscow">Moscow (MSK)</option>
                            <option value="Europe/Istanbul">Istanbul (EET/EEST)</option>
                        </optgroup>
                        <optgroup label="Asia">
                            <option value="Asia/Dubai">Dubai (GST)</option>
                            <option value="Asia/Kolkata">India (IST)</option>
                            <option value="Asia/Bangkok">Bangkok (ICT)</option>
                            <option value="Asia/Singapore">Singapore (SGT)</option>
                            <option value="Asia/Hong_Kong">Hong Kong (HKT)</option>
                            <option value="Asia/Shanghai">Shanghai (CST)</option>
                            <option value="Asia/Tokyo">Tokyo (JST)</option>
                            <option value="Asia/Seoul">Seoul (KST)</option>
                            <option value="Asia/Manila">Manila (PHT)</option>
                            <option value="Australia/Sydney">Sydney (AEDT/AEST)</option>
                        </optgroup>
                        <optgroup label="Africa">
                            <option value="Africa/Cairo">Cairo (EET)</option>
                            <option value="Africa/Johannesburg">Johannesburg (SAST)</option>
                            <option value="Africa/Lagos">Lagos (WAT)</option>
                            <option value="Africa/Nairobi">Nairobi (EAT)</option>
                        </optgroup>
                    </select>
                    <button id="addBtn" class="add-btn">Add Zone</button>
                </div>
            </section>

            <!-- Format Toggle -->
            <section class="format-toggle">
                <label class="radio-group">
                    <input type="radio" name="format" value="24" checked>
                    <span>24 Hour</span>
                </label>
                <label class="radio-group">
                    <input type="radio" name="format" value="12">
                    <span>12 Hour (AM/PM)</span>
                </label>
            </section>

            <!-- Clocks Grid -->
            <section class="clocks-grid" id="clocksGrid">
                <!-- Clocks will be added here dynamically -->
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>🌍 Time Zone Digital Clock | Made with ❤️ by Pexih Dev</p>
            <p class="footer-info">All times are automatically updated every second</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
